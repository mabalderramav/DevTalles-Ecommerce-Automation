# Environment should be MASTER, DEV, STG, QA, UAT or PROD
environment.name=QA
## This is not specified, it will be read from ./src/test/resources/EnvironmentUi.json
environment.filePath=

#UI tests execution configuration
ui.implicitTimeWait=15
ui.explicitTimeWait=15
ui.sleepWaitTime=1
ui.pageLoadTimeWait=30
ui.width=1920
ui.height=1200

# CHROME_DOCKER or CHROME or CHROME_REMOTE
ui.browser=CHROME

# Selenium Grid URL
ui.seleniumHubUrl=http://localhost:4444/wd/hub
ui.seleniumHubPort=4444

# here we can see the Chrome browser and chrome driver for each version: https://chromedriver.chromium.org/downloads
# if this is not specified, the latest version will be used.
ui.driverVersion =

# Downloads folder
ui.downloads=src/test/resources/downloads/

# Browser logs
ui.browserLogs=false

# Incognito mode
ui.incognitoMode=false